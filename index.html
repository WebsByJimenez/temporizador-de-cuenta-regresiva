<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temporizador de Cuenta Regresiva - Año Nuevo</title>
    <meta
      name="description"
      content="Temporizador de cuenta regresiva perpetuo y automatizado para Año Nuevo." />

    <link rel="shortcut icon" href="./img/procesando.png" type="image/x-icon" />

    <link rel="stylesheet" href="./css/estilos.css" />
  </head>
  <body>
    <main>
      <h2>Temporizador de Cuenta Regresiva para Año Nuevo</h2>

      <div class="year hidden" id="year">----</div>

      <div class="countdown hidden" id="countdown">
        <div><time id="day">00</time></div>
        <div><time id="hour">00</time></div>
        <div><time id="minute">00</time></div>
        <div><time id="second">00</time></div>
      </div>
    </main>

    <script src="./js/index.js"></script>
  </body>
</html>
